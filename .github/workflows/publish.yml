name: publish

# Manual npm publish for the monorepo. Run from the Actions tab → "publish" → Run workflow.
#
# Pick which package to publish: `memory`, `engine`, `kit`, or `all`. The actual per-package
# preflight + publish logic lives in the reusable workflow _publish-one.yml; this file just selects
# the package(s) and enforces ordering.
#
# Ordering: @sabaiway/agent-workflow-kit composes on top of memory + engine, which are independent of
# each other — so on `all` they publish in PARALLEL and kit runs only after BOTH. That is enforced
# by `kit needs: [memory, engine]` (kit refuses to run if either dependency actually published and
# failed). memory and engine have no edge between them, so a memory failure does not gate engine (and
# vice versa) — only kit waits on both. For a single package the other jobs are simply skipped.
#
# Auth: NODE_AUTH_TOKEN comes from the NPM_TOKEN repo secret (inherited into the reusable
# workflow). Provenance is attached via OIDC (id-token: write). See _publish-one.yml for the
# token requirements and the preflight checks that turn auth problems into clear errors.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to publish'
        type: choice
        options:
          - all
          - memory
          - engine
          - kit
        default: all
      dry_run:
        description: 'Dry run — validate & pack, do not actually publish'
        type: boolean
        default: false

permissions:
  contents: write # _publish-one cuts the git tag + GitHub Release (caller must grant the cap)
  id-token: write # npm provenance (supply-chain attestation)

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # memory + engine publish in parallel (independent of each other); kit runs after both
  # (it composes on top of memory + engine). See the header note on ordering.
  memory:
    if: ${{ inputs.package == 'memory' || inputs.package == 'all' }}
    uses: ./.github/workflows/_publish-one.yml
    with:
      dir: agent-workflow-memory
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  engine:
    if: ${{ inputs.package == 'engine' || inputs.package == 'all' }}
    uses: ./.github/workflows/_publish-one.yml
    with:
      dir: agent-workflow-engine
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  kit:
    # `needs: [memory, engine]` makes kit wait for both; `always()` lets kit still run when they were
    # SKIPPED (package=kit), while the result guards block kit if either dependency was actually
    # published and FAILED (package=all).
    needs: [memory, engine]
    if: ${{ always() && (inputs.package == 'kit' || inputs.package == 'all') && (needs.memory.result == 'success' || needs.memory.result == 'skipped') && (needs.engine.result == 'success' || needs.engine.result == 'skipped') }}
    uses: ./.github/workflows/_publish-one.yml
    with:
      dir: agent-workflow-kit
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
